DISPLAY=:0
XAUTHORITY=/home/jordif/.Xauthority
# optionally DBUS_SESSION_BUS_ADDRESS=...

# Ensure systemd knows the desktop is qtile.
XDG_CURRENT_DESKTOP=qtile
XDG_SESSION_DESKTOP=qtile
DESKTOP_SESSION=qtile

# Fixed ssh-agent socket (socket-activated ssh-agent.socket user unit), so
# both systemd --user services (e.g. the ghostty daemon) and login shells
# share one agent.
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket
